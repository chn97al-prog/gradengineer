<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>طلب مجموعة | تجهيزات المهندس</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<section class="home">

<div class="card">

<img src="assets/logo.png" class="logo">

<h1>طلب مجموعة</h1>

<p class="welcome">

يرجى تعبئة جميع البيانات المطلوبة.

</p>

<form id="groupOrderForm">

<!-- الاسم -->

<div class="input-box">

<label>

الاسم الثلاثي

</label>

<input
type="text"
id="studentName"
required>

</div>

<br>

<!-- اسم الوشاح -->

<div class="input-box">

<label>

الاسم الذي يكتب على الوشاح

</label>

<input
type="text"
id="sashName"
required>

</div>

<br>

<!-- الكتابة على الظهر -->

<div class="input-box">

<label>

الكتابة على الظهر

</label>

<input
type="text"
id="backText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة الظهر (اختياري)

</label>

<input
type="file"
id="backImage"
accept="image/*">

</div>

<br>

<!-- القبعة -->

<div class="input-box">

<label>

الكتابة على القبعة

</label>

<input
type="text"
id="capText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة القبعة (اختياري)

</label>

<input
type="file"
id="capImage"
accept="image/*">

</div>

<br>

<!-- جانب القبعة -->

<div class="input-box">

<label>

الكتابة على جانب القبعة

</label>

<input
type="text"
id="sideCapText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة جانب القبعة (اختياري)

</label>

<input
type="file"
id="sideCapImage"
accept="image/*">

</div>

<br>

<button
type="submit"
class="btn btn-primary">

<i class="fa-solid fa-paper-plane"></i>

إرسال الطلب

</button>

</form>

<br>

<a
href="index.html"
class="btn btn-secondary">

<i class="fa-solid fa-house"></i>

العودة للرئيسية

</a>

</div>

</section>

<script>

document
.getElementById("groupOrderForm")
.addEventListener("submit",function(e){

e.preventDefault();

alert("تم إرسال الطلب بنجاح.");

});

/*
لاحقاً سيتم إرسال البيانات إلى:

Firebase

Google Sheets

Telegram Bot

*/

</script>

</body>

</html>
