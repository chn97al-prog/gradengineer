<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلب الفردي | تجهيزات المهندس</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div class="background"></div>

<section class="home">

<div class="card">

<img src="assets/logo.png" class="logo">

<h1>الطلب الفردي</h1>

<p class="welcome">
    اختر نوع الطلب
</p>

<!-- ===================== -->
<!-- اختيار نوع الطلب -->
<!-- ===================== -->
<div class="buttons">

<button class="btn btn-primary" onclick="selectPackage('عادي')">

<i class="fa-solid fa-shirt"></i>

عادي

</button>

<button class="btn btn-primary" onclick="selectPackage('ملكي')">

<i class="fa-solid fa-crown"></i>

ملكي

</button>

<button class="btn btn-primary" onclick="showAmerican()">

<i class="fa-solid fa-star"></i>

أمريكي

</button>

</div>

<!-- ===================== -->
<!-- أنواع الوشاح الأمريكي -->
<!-- ===================== -->

<div id="americanSection" style="display:none;margin-top:30px;">

<h2 style="margin-bottom:20px;color:#D4AF37;">
اختر نوع الوشاح
</h2>

<div class="buttons">

<button class="btn btn-secondary"
onclick="selectAmerican('وشاح عادي')">

وشاح عادي

</button>

<button class="btn btn-secondary"
onclick="selectAmerican('وشاح ملكي')">

وشاح ملكي

</button>

<button class="btn btn-secondary"
onclick="selectAmerican('وشاح مائل')">

وشاح مائل

</button>

</div>

</div>

<!-- ===================== -->
<!-- اختيار نوع القماش -->
<!-- ===================== -->

<div id="fabricSection" style="display:none;margin-top:30px;">

<h2 style="margin-bottom:20px;color:#D4AF37;">
اختر نوع القماش
</h2>

<div class="buttons">

<button class="btn btn-secondary"
onclick="selectFabric('بوليستر')">

<i class="fa-solid fa-layer-group"></i>

بوليستر

</button>

<button class="btn btn-secondary"
onclick="selectFabric('باربي')">

<i class="fa-solid fa-layer-group"></i>

باربي

</button>

<button class="btn btn-secondary"
onclick="selectFabric('كوبرا')">

<i class="fa-solid fa-layer-group"></i>

كوبرا

</button>

</div>

</div>

<br>

<a href="index.html" class="btn btn-secondary">

<i class="fa-solid fa-arrow-right"></i>

العودة للرئيسية

</a>

</div>

</section>

<script>

function selectPackage(type){

    localStorage.setItem("package",type);
    
    // إظهار قسم اختيار القماش
    document.getElementById("fabricSection").style.display="block";
    
    // إخفاء قسم الوشاح الأمريكي إذا كان ظاهراً
    document.getElementById("americanSection").style.display="none";

}

function showAmerican(){

    document.getElementById("americanSection").style.display="block";
    
    // إخفاء قسم القماش
    document.getElementById("fabricSection").style.display="none";

}

function selectAmerican(type){

    localStorage.setItem("package","أمريكي");

    localStorage.setItem("sashType",type);
    
    // إظهار قسم اختيار القماش
    document.getElementById("fabricSection").style.display="block";
    
    // إخفاء قسم الوشاح الأمريكي
    document.getElementById("americanSection").style.display="none";

}

function selectFabric(fabric){

    localStorage.setItem("fabric",fabric);

    window.location.href="regular-order.html";

}

</script>

</body>

</html>
