<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>طلب مجموعة | تجهيزات المهندس</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<section class="home">

<div class="card">

<img src="assets/logo.png" class="logo">

<h1>طلب مجموعة</h1>

<p class="welcome">

يرجى تعبئة جميع البيانات المطلوبة.

</p>

<form id="groupOrderForm">

<!-- الاسم -->

<div class="input-box">

<label>

الاسم الثلاثي

</label>

<input
type="text"
id="studentName"
required>

</div>

<br>

<!-- اسم الوشاح -->

<div class="input-box">

<label>

الاسم الذي يكتب على الوشاح

</label>

<input
type="text"
id="sashName"
required>

</div>

<br>

<!-- الكتابة على الظهر -->

<div class="input-box">

<label>

الكتابة على الظهر

</label>

<input
type="text"
id="backText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة الظهر (اختياري)

</label>

<input
type="file"
id="backImage"
accept="image/*">

</div>

<br>

<!-- القبعة -->

<div class="input-box">

<label>

الكتابة على القبعة

</label>

<input
type="text"
id="capText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة القبعة (اختياري)

</label>

<input
type="file"
id="capImage"
accept="image/*">

</div>

<br>

<!-- جانب القبعة -->

<div class="input-box">

<label>

الكتابة على جانب القبعة

</label>

<input
type="text"
id="sideCapText">

</div>

<br>

<div class="input-box">

<label>

إرفاق صورة جانب القبعة (اختياري)

</label>

<input
type="file"
id="sideCapImage"
accept="image/*">

</div>

<br>

<!-- ===================== -->
<!-- قسم الإضافات -->
<!-- ===================== -->

<h2 style="margin-top: 40px; margin-bottom: 25px; text-align: center;">
<i class="fa-solid fa-gift"></i> الإضافات
</h2>

<!-- الشال الأمريكي -->
<div class="input-box" style="display: flex; align-items: center; gap: 15px;">
<input 
type="checkbox" 
id="americanShawl"
style="width: auto; margin: 0;">
<label for="americanShawl" style="margin: 0; flex: 1;">
<i class="fa-solid fa-star"></i> شال أمريكي
</label>
</div>

<br>

<!-- تطعيم بالردن -->
<div class="input-box" style="display: flex; align-items: center; gap: 15px;">
<input 
type="checkbox" 
id="sleeveEmbroidery"
style="width: auto; margin: 0;">
<label for="sleeveEmbroidery" style="margin: 0; flex: 1;">
<i class="fa-solid fa-needle"></i> تطعيم بالردن
</label>
</div>

<br>

<!-- ردن مبطن -->
<div class="input-box" style="display: flex; align-items: center; gap: 15px;">
<input 
type="checkbox" 
id="sleeveLinned"
style="width: auto; margin: 0;">
<label for="sleeveLinned" style="margin: 0; flex: 1;">
<i class="fa-solid fa-layer-group"></i> ردن مبطن
</label>
</div>

<br>

<!-- زيادة في طول -->
<div class="input-box">
<div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px;">
<input 
type="checkbox" 
id="lengthIncrease"
style="width: auto; margin: 0;">
<label for="lengthIncrease" style="margin: 0; flex: 1;">
<i class="fa-solid fa-arrow-up"></i> زيادة في طول الروب
</label>
</div>

<input 
type="number" 
id="lengthIncreaseAmount"
placeholder="أدخل كمية الزيادة بالسنتيمتر (سم)"
min="0"
step="0.5"
style="display: none;">
</div>

<br>

<!-- ===================== -->

<button
type="submit"
class="btn btn-primary">

<i class="fa-solid fa-paper-plane"></i>

إرسال الطلب

</button>

</form>

<br>

<a
href="index.html"
class="btn btn-secondary">

<i class="fa-solid fa-house"></i>

العودة للرئيسية

</a>

</div>

</section>

<script>

// إظهار/إخفاء حقل كمية الزيادة
document.getElementById("lengthIncrease").addEventListener("change", function(){

    const amountInput = document.getElementById("lengthIncreaseAmount");
    
    if(this.checked){
        amountInput.style.display = "block";
        amountInput.required = true;
    } else {
        amountInput.style.display = "none";
        amountInput.required = false;
        amountInput.value = "";
    }

});

document
.getElementById("groupOrderForm")
.addEventListener("submit", function(e){

e.preventDefault();

// جمع بيانات الإضافات
const additions = {
    americanShawl: document.getElementById("americanShawl").checked,
    sleeveEmbroidery: document.getElementById("sleeveEmbroidery").checked,
    sleeveLinned: document.getElementById("sleeveLinned").checked,
    lengthIncrease: document.getElementById("lengthIncrease").checked,
    lengthIncreaseAmount: document.getElementById("lengthIncreaseAmount").value || 0
};

console.log("الإضافات المختارة:", additions);

alert("تم إرسال الطلب بنجاح.");

});

/*
لاحقاً سيتم إرسال البيانات إلى:

Firebase

Google Sheets

Telegram Bot

*/

</script>

</body>

</html>
