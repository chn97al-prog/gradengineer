<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الطلب الفردي | تجهيزات المهندسV2</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

</head>


<body>

<div class="background"></div>


<section class="home">

<div class="card" style="max-width:900px">


<img src="assets/logo.png" class="logo" alt="logo">


<h1>الطلب الفردي</h1>


<p id="selectedPackage"></p>



<form id="individualForm">


<!-- ===================== -->
<!-- معلومات الطالب -->
<!-- ===================== -->

<label>الاسم الثلاثي</label>
<input type="text" id="studentName" required>

<label>الاسم على الوشاح</label>
<input type="text" id="sashName" required>

<!-- ===================== -->
<!-- الطرف الثابت -->
<!-- ===================== -->

<div id="fixedSashSection">

<label>الطرف الثابت للوشاح</label>
<input type="text" id="fixedSash">

<label>شعار الجامعة</label>
<input
type="file"
id="universityLogo"
accept="image/*">

</div>

<!-- ===================== -->
<!-- الظهر -->
<!-- ===================== -->

<div id="backSection">

<label>الكتابة على الظهر</label>
<input
type="text"
id="backText">

<label>صورة الظهر</label>
<input
type="file"
id="backImage"
accept="image/*">

</div>

<!-- ===================== -->
<!-- القبعة -->
<!-- ===================== -->

<label>الكتابة على القبعة</label>

<input
type="text"
id="capText">

<label>صورة القبعة</label>

<input
type="file"
id="capImage"
accept="image/*">

<!-- ===================== -->
<!-- جانب القبعة -->
<!-- ===================== -->

<label>الكتابة على جانب القبعة</label>

<input
type="text"
id="sideCapText">

<label>صورة جانب القبعة</label>

<input
type="file"
id="sideCapImage"
accept="image/*">

<!-- ===================== -->
<!-- القياسات -->
<!-- ===================== -->

<h2>القياسات</h2>

<label>طول الروب</label>
<input
type="number"
id="robeLength"
required>

<label>طول الردن</label>
<input
type="number"
id="sleeveLength"
required>

<label>الكتف</label>
<input
type="number"
id="shoulder"
required>

<label>محيط الصدر</label>
<input
type="number"
id="chest"
required>

<label>قياس الرأس</label>
<input
type="number"
id="headSize"
required>

<!-- ===================== -->
<!-- الهاتف -->
<!-- ===================== -->

<label>رقم الهاتف</label>

<input
type="tel"
id="phone"
placeholder="07xxxxxxxxx"
required>

<!-- ===================== -->

<button
type="submit"
class="btn btn-primary">

إرسال الطلب

</button>


</form>


</div>

</section>




<script type="module">

import { supabase } from "./js/supabase.js";

const packageType = localStorage.getItem("package") || "";
const sashType = localStorage.getItem("sashType") || "";

  /* ===========================
   التحكم بالحقول
=========================== */

const fixedSashSection = document.getElementById("fixedSashSection");
const backSection = document.getElementById("backSection");

// إخفاء الكل بالبداية
fixedSashSection.style.display = "none";
backSection.style.display = "none";

// ===========================
// العادي
// ===========================

if (
    packageType === "عادي" ||
    (packageType === "أمريكي" && sashType === "وشاح عادي")
){

    fixedSashSection.style.display = "block";

}

// ===========================
// الملكي
// ===========================

if(
    packageType === "ملكي" ||
    (packageType === "أمريكي" && sashType === "وشاح ملكي")
){

    fixedSashSection.style.display = "block";
    backSection.style.display = "block";

}

// ===========================
// الأمريكي المائل
// ===========================

if(
    packageType === "أمريكي" &&
    sashType === "وشاح مائل"
){

    fixedSashSection.style.display = "none";
    backSection.style.display = "none";

}

document.getElementById("selectedPackage").innerHTML =
packageType === "أمريكي"
?
`نوع الطلب: ${packageType}<br>نوع الوشاح: ${sashType}`
:
`نوع الطلب: ${packageType}`;

async function uploadImage(file){

    if(!file) return "";

    const fileName =
    Date.now() + "_" + file.name;

    const { error } = await supabase
    .storage
    .from("orders")
    .upload(fileName,file);

    if(error){

        console.log(error);

        return "";

    }

    const { data } = supabase
    .storage
    .from("orders")
    .getPublicUrl(fileName);

    return data.publicUrl;

}

document.getElementById("individualForm").addEventListener("submit", async(e)=>{

e.preventDefault();

  const universityLogoUrl = await uploadImage(
    document.getElementById("universityLogo")?.files[0]
);

const backImageUrl = await uploadImage(
    document.getElementById("backImage")?.files[0]
);

const capImageUrl = await uploadImage(
    document.getElementById("capImage")?.files[0]
);

const sideCapImageUrl = await uploadImage(
    document.getElementById("sideCapImage")?.files[0]
);


try{

const { error } = await supabase
.from("orders")
.insert([{

    order_type: "طلب فردي",

    package: packageType,

    sash: sashType,

    student_name: document.getElementById("studentName").value,

    sash_name: document.getElementById("sashName").value,

    fixed_sash: document.getElementById("fixedSash")?.value || "",

    back_text: document.getElementById("backText")?.value || "",

    cap_text: document.getElementById("capText")?.value || "",

    side_cap_text: document.getElementById("sideCapText")?.value || "",

    robe_length: Number(document.getElementById("robeLength").value),

    sleeve_length: Number(document.getElementById("sleeveLength").value),

    shoulder: Number(document.getElementById("shoulder").value),

    chest: Number(document.getElementById("chest").value),

    head_size: Number(document.getElementById("headSize").value),

    phone: document.getElementById("phone").value,

    university_logo: universityLogoUrl,

    back_image: backImageUrl,

    cap_image: capImageUrl,

    side_cap_image: sideCapImageUrl,


}]);

if (error) {
    console.error(error);
    alert("حدث خطأ أثناء حفظ الطلب");
    return;
}

alert("تم إرسال الطلب بنجاح ✅");

document.getElementById("individualForm").reset();

}

catch(error){


if (error) {      console.error(error);      alert(error.message);      return;  }

alert("حدث خطأ أثناء إرسال الطلب");


}



});


</script>



</body>

</html>
