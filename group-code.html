<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>طلب مجموعة | تجهيزات المهندس</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<section class="home">

<div class="card">

<img src="assets/logo.png" class="logo" alt="تجهيزات المهندس">

<h1>طلب مجموعة</h1>

<p class="welcome">

أدخل كود المجموعة الذي زودك به ممثل الدفعة.

</p>

<form id="groupForm">

<div class="input-box">

<input
type="text"
id="groupCode"
placeholder="مثال : ENG-26-0001"
required>

</div>

<br>

<button
type="submit"
class="btn btn-primary">

<i class="fa-solid fa-arrow-right"></i>

متابعة

</button>

</form>

<br>

<p id="errorMessage"></p>

<br>

<a href="index.html" class="btn btn-secondary">

<i class="fa-solid fa-house"></i>

العودة للرئيسية

</a>

</div>

</section>

<script>

// مؤقتاً إلى حين ربط Firebase

const validCodes = [

"ENG-26-0001",

"ENG-26-0002",

"ENG-26-0003"

];

document
.getElementById("groupForm")
.addEventListener("submit",function(e){

e.preventDefault();

const code=document
.getElementById("groupCode")
.value.trim();

if(validCodes.includes(code)){

localStorage.setItem("groupCode",code);

window.location.href="group-order.html";

}else{

document.getElementById("errorMessage").innerHTML="❌ الكود غير صحيح";

document.getElementById("errorMessage").style.color="#ff4d4d";

}

});

</script>

</body>

</html>
